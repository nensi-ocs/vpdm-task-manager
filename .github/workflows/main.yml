name: Build & Deploy (Vite + Nest + Prisma)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    name: Build Artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json

      - name: Build frontend (Vite)
        working-directory: frontend
        shell: bash
        run: |
          set -euo pipefail
          npm ci
          npm run build
          test -d dist

      - name: Pack frontend artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          tar -czf artifacts/frontend.tgz -C frontend dist
          ls -lah artifacts/frontend.tgz

      - name: Build backend (Nest + Prisma)
        working-directory: backend
        shell: bash
        run: |
          set -euo pipefail
          npm ci
          npx prisma generate
          npm run build

      - name: Pack backend artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          FILES=(dist prisma package.json package-lock.json)
          if [ -f backend/.env ]; then FILES+=(".env"); fi
          tar -czf artifacts/backend.tgz -C backend "${FILES[@]}"
          ls -lah artifacts/backend.tgz

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deploy-bundles
          path: artifacts/*.tgz

  deploy:
    name: Deploy to VPS
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: deploy-bundles
          path: artifacts

      - name: Upload bundles to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          passphrase: ${{ secrets.SERVER_SSH_PASSPHRASE }}
          port: 22
          source: "artifacts/*.tgz"
          target: "/tmp/vpdm_deploy"

      - name: Deploy + Prisma migrate + PM2 restart
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          passphrase: ${{ secrets.SERVER_SSH_PASSPHRASE }}
          port: 22
          script: |
            set -euo pipefail

            # Same layout as jwell_b2b: /var/www/html/<app>/{frontend,backend,backups}
            APP="/var/www/html/vpdm-task-manager"
            FRONT="$APP/frontend"
            BACK="$APP/backend"
            BKP="$APP/backups"
            TS="$(date +%Y%m%d_%H%M%S)"

            # Set true after DATABASE_URL in backend/.env matches Postgres on this VPS
            RUN_PRISMA_MIGRATE=false
            # Static SPA via PM2 (same port convention as Vite dev: 5173)
            FRONT_PORT=5173

            mkdir -p "$FRONT" "$BACK" "$BKP"

            echo "=== Backup current deployment ==="
            [ -d "$FRONT" ] && tar -czf "$BKP/frontend_$TS.tgz" -C "$APP" frontend || true
            [ -d "$BACK" ] && tar -czf "$BKP/backend_$TS.tgz" -C "$APP" backend || true

            echo "=== Deploy frontend (Vite dist → frontend/) ==="
            rm -rf "$FRONT"/*
            rm -rf /tmp/vpdm_deploy/extract_frontend
            mkdir -p /tmp/vpdm_deploy/extract_frontend
            tar -xzf /tmp/vpdm_deploy/artifacts/frontend.tgz -C /tmp/vpdm_deploy/extract_frontend
            cp -r /tmp/vpdm_deploy/extract_frontend/dist/. "$FRONT/"

            echo "=== Deploy backend (preserve existing .env on server) ==="
            if [ -f "$BACK/.env" ]; then
              cp "$BACK/.env" /tmp/vpdm_backend.env
            fi

            rm -rf "$BACK"/*
            mkdir -p "$BACK"
            tar -xzf /tmp/vpdm_deploy/artifacts/backend.tgz -C "$BACK"

            if [ -f /tmp/vpdm_backend.env ]; then
              mv /tmp/vpdm_backend.env "$BACK/.env"
              chmod 600 "$BACK/.env"
            fi

            echo "=== Install backend production dependencies ==="
            cd "$BACK"
            npm ci --omit=dev
            npx prisma generate

            if [ ! -f "$BACK/.env" ]; then
              echo "ERROR: $BACK/.env not found. Add it on the server or commit backend/.env for CI to pack."
              exit 1
            fi

            set -a
            source "$BACK/.env"
            set +a

            if [ "$RUN_PRISMA_MIGRATE" = true ]; then
              echo "=== Run Prisma migrate deploy ==="
              npx prisma migrate deploy
            else
              echo "=== Skipping Prisma migrate (RUN_PRISMA_MIGRATE=false) ==="
            fi

            echo "=== Start/restart backend with PM2 ==="
            command -v pm2 >/dev/null 2>&1 || (echo "ERROR: pm2 not installed" && exit 1)

            if pm2 describe vpdm-task-api >/dev/null 2>&1; then
              pm2 restart vpdm-task-api --update-env
            else
              pm2 start dist/main.js --name vpdm-task-api
            fi

            echo "=== Start/restart frontend static server (PM2 + serve) ==="
            if pm2 describe vpdm-task-web >/dev/null 2>&1; then
              pm2 restart vpdm-task-web --update-env
            else
              pm2 start bash --name vpdm-task-web -- -c "cd \"$FRONT\" && exec npx --yes serve@14 -s . -l $FRONT_PORT"
            fi

            pm2 save

            echo "=== Health checks ==="
            API_PORT="${PORT:-3001}"
            API_OK=0
            for i in 1 2 3; do
              if curl -sS -I "http://127.0.0.1:${API_PORT}/api" >/dev/null; then
                echo "Backend OK (port ${API_PORT})"
                API_OK=1
                break
              fi
              echo "Backend check ($i/3)..."
              sleep 2
            done

            WEB_OK=0
            for i in 1 2 3; do
              if curl -sS -I "http://127.0.0.1:${FRONT_PORT}/" >/dev/null; then
                echo "Frontend OK (port ${FRONT_PORT})"
                WEB_OK=1
                break
              fi
              echo "Frontend check ($i/3)..."
              sleep 2
            done

            if [ "$API_OK" = 1 ] && [ "$WEB_OK" = 1 ]; then
              exit 0
            fi
            echo "Health check failed (need both API and frontend)"
            exit 1
